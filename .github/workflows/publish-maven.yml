name: Maven Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  remote-publish:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      MAVEN_REPOSITORY_URL: ${{ secrets.MAVEN_REPOSITORY_URL }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup JDK
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "23"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.4

      - name: Validate publish configuration
        shell: bash
        run: |
          if [ -z "$MAVEN_REPOSITORY_URL" ]; then
            echo "MAVEN_REPOSITORY_URL is required."
            exit 1
          fi

          if [ -n "$MAVEN_USERNAME" ] && [ -z "$MAVEN_PASSWORD" ]; then
            echo "MAVEN_PASSWORD is required when MAVEN_USERNAME is set."
            exit 1
          fi

          if [ -z "$MAVEN_USERNAME" ] && [ -n "$MAVEN_PASSWORD" ]; then
            echo "MAVEN_USERNAME is required when MAVEN_PASSWORD is set."
            exit 1
          fi

          if [ -n "$SIGNING_KEY" ] && [ -z "$SIGNING_PASSWORD" ]; then
            echo "SIGNING_PASSWORD is required when SIGNING_KEY is set."
            exit 1
          fi

          if [ -z "$SIGNING_KEY" ] && [ -n "$SIGNING_PASSWORD" ]; then
            echo "SIGNING_KEY is required when SIGNING_PASSWORD is set."
            exit 1
          fi

      - name: Publish libraries
        shell: bash
        run: bash ./gradlew publish

name: Maven Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate-publish:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.publish-mode.outputs.should_publish }}
    permissions:
      contents: read
    env:
      MAVEN_REPOSITORY_URL: ${{ secrets.MAVEN_REPOSITORY_URL }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Detect publish mode
        id: publish-mode
        shell: bash
        run: |
          if [ "${ACT:-}" = "true" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Local act run detected; workflow will stop after validation."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate publish configuration
        shell: bash
        run: |
          print_act_hint() {
            cat <<'EOF'
          For local act runs, copy:
            - .env.publish.example -> .env.publish
            - .secrets.publish.example -> .secrets.publish
          Use SIGNING_KEY_BASE64 for the Base64-encoded ASCII-armored private key on one line.
          Then pass them explicitly, for example:
            act workflow_dispatch -W .github/workflows/publish-maven.yml --env-file .env.publish --secret-file .secrets.publish
          EOF
          }

          if [ -z "$MAVEN_REPOSITORY_URL" ]; then
            echo "MAVEN_REPOSITORY_URL is required for strict remote publish validation."
            print_act_hint
            exit 1
          fi

          if [ -n "$MAVEN_USERNAME" ] && [ -z "$MAVEN_PASSWORD" ]; then
            echo "MAVEN_PASSWORD is required when MAVEN_USERNAME is set."
            print_act_hint
            exit 1
          fi

          if [ -z "$MAVEN_USERNAME" ] && [ -n "$MAVEN_PASSWORD" ]; then
            echo "MAVEN_USERNAME is required when MAVEN_PASSWORD is set."
            print_act_hint
            exit 1
          fi

          if [ -n "$SIGNING_KEY_BASE64" ] && [ -z "$SIGNING_PASSWORD" ]; then
            echo "SIGNING_PASSWORD is required when SIGNING_KEY_BASE64 is set."
            print_act_hint
            exit 1
          fi

          if [ -z "$SIGNING_KEY_BASE64" ] && [ -n "$SIGNING_PASSWORD" ]; then
            echo "SIGNING_KEY_BASE64 is required when SIGNING_PASSWORD is set."
            print_act_hint
            exit 1
          fi

  remote-publish:
    if: ${{ needs.validate-publish.outputs.should_publish == 'true' }}
    needs: validate-publish
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      MAVEN_REPOSITORY_URL: ${{ secrets.MAVEN_REPOSITORY_URL }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup JDK
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "23"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.4

      - name: Publish libraries
        shell: bash
        run: ./gradlew publish
